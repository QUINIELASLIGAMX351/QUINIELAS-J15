<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quinielas 351 - J15</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    padding: 8px;
    display: flex;
    justify-content: center;
  }
.container {
    width: 100%;
    max-width: 400px;
    background: #1e293b;
    border-radius: 12px;
    padding: 12px;
  }
  h1 {
    text-align: center;
    color: #22c55e;
    font-size: 1.4rem;
    margin-bottom: 2px;
  }
.sub {
    text-align: center;
    color: #94a3b8;
    font-size: 0.85rem;
    margin-bottom: 12px;
  }
.partido {
    background: #334155;
    border-radius: 8px;
    padding: 8px;
    margin-bottom: 6px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 6px;
  }
.equipo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
.equipo img {
    width: 28px;
    height: 28px;
    object-fit: contain;
  }
.equipo span {
    font-size: 0.65rem;
    text-align: center;
    font-weight: 600;
    line-height: 1.1;
  }
.botones {
    display: flex;
    gap: 3px;
  }
.botones button {
    width: 30px;
    height: 30px;
    border: none;
    border-radius: 6px;
    background: #475569;
    color: #e2e8f0;
    font-weight: bold;
    cursor: pointer;
    font-size: 0.75rem;
  }
.botones button.activo { background: #22c55e; color: #0f172a; }
  input {
    width: 100%;
    padding: 10px;
    margin: 10px 0 6px 0;
    border-radius: 6px;
    border: 1px solid #475569;
    background: #334155;
    color: #e2e8f0;
    font-size: 0.95rem;
  }
.faltantes {
    text-align: center;
    font-size: 0.75rem;
    color: #fbbf24;
    margin-bottom: 8px;
    height: 14px;
  }
.acciones {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
.acciones button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    font-size: 0.85rem;
  }
  #btnAcumular { background: #3b82f6; color: white; }
  #btnLimpiar { background: #6b7280; color: white; }
  #btnEnviar { 
    background: #25D366; 
    color: white; 
    grid-column: span 2;
    font-size: 0.95rem;
  }
.acumuladas {
    margin-top: 14px;
    padding-top: 10px;
    border-top: 1px solid #475569;
  }
.acumuladas-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
.acumuladas h3 {
    font-size: 0.9rem;
    color: #22c55e;
  }
.btns-acumuladas {
    display: flex;
    gap: 4px;
  }
.btns-acumuladas button {
    background: #475569;
    color: #e2e8f0;
    border: none;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 0.7rem;
    cursor: pointer;
  }
.quiniela-item {
    background: #334155;
    padding: 6px 8px;
    border-radius: 6px;
    margin-bottom: 5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.8rem;
  }
.btn-borrar {
    background: #ef4444;
    color: white;
    border: none;
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 0.7rem;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="container">
  <h1>QUINIELAS 351</h1>
  <p class="sub">Jornada 15 - $10 c/u</p>
  
  <div id="partidos"></div>
  
  <input type="text" id="nombre" placeholder="Escribe tu nombre">
  <div class="faltantes" id="faltantes"></div>
  
  <div class="acciones">
    <button id="btnAcumular">Acumular</button>
    <button id="btnLimpiar">Limpiar</button>
    <button id="btnEnviar">Mandar por WhatsApp</button>
  </div>

  <div class="acumuladas" id="seccionAcumuladas" style="display:none">
    <div class="acumuladas-header">
      <h3>Total: <span id="total">0</span> = $<span id="totalDinero">0</span></h3>
      <div class="btns-acumuladas">
        <button id="btnDescargar">Descargar.txt</button>
        <button id="btnBorrarTodas">Borrar todas</button>
      </div>
    </div>
    <div id="listaAcumuladas"></div>
  </div>
</div>

<script>
  const TU_NUMERO = "523513743191"; // CAMBIA ESTE NÚMERO
  
  const partidos = [
    { local: "SAN LUIS", visita: "PUMAS", imgL: "sanluis", imgV: "pumas" },
    { local: "MAZATLAN", visita: "QUERETARO", imgL: "mazatlan", imgV: "queretaro" },
    { local: "NECAXA", visita: "TIGRES", imgL: "necaxa", imgV: "tigres" },
    { local: "CRUZ AZUL", visita: "TIJUANA", imgL: "cruzazul", imgV: "tijuana" },
    { local: "MONTERREY", visita: "PACHUCA", imgL: "monterrey", imgV: "pachuca" },
    { local: "CHIVAS", visita: "PUEBLA", imgL: "chivas", imgV: "puebla" },
    { local: "LEON", visita: "JUAREZ", imgL: "leon", imgV: "juarez" },
    { local: "AMÉRICA", visita: "TOLUCA", imgL: "america", imgV: "toluca" },
    { local: "SANTOS", visita: "ATLAS", imgL: "santos", imgV: "atlas" }
  ];

  let resultados = {};
  let acumuladas = JSON.parse(localStorage.getItem('quinielas351') || '[]');

  const divPartidos = document.getElementById('partidos');
  partidos.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'partido';
    div.innerHTML = `
      <div class="equipo">
        <img src="escudos/${p.imgL}.png" alt="${p.local}" onerror="this.style.display='none'">
        <span>${p.local}</span>
      </div>
      <div class="botones">
        <button data-p="${i}" data-r="L">L</button>
        <button data-p="${i}" data-r="E">E</button>
        <button data-p="${i}" data-r="V">V</button>
      </div>
      <div class="equipo">
        <img src="escudos/${p.imgV}.png" alt="${p.visita}" onerror="this.style.display='none'">
        <span>${p.visita}</span>
      </div>
    `;
    divPartidos.appendChild(div);
  });

  function actualizarFaltantes() {
    const faltan = 9 - Object.keys(resultados).length;
    document.getElementById('faltantes').textContent = faltan > 0? `Faltan ${faltan} partidos` : 'Listo para acumular ✓';
  }

  document.querySelectorAll('.botones button').forEach(btn => {
    btn.onclick = () => {
      const p = btn.dataset.p;
      resultados[p] = btn.dataset.r;
      btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('activo'));
      btn.classList.add('activo');
      actualizarFaltantes();
    };
  });

  document.getElementById('btnAcumular').onclick = () => {
    const nombre = document.getElementById('nombre').value.trim();
    if (!nombre) return alert('Pon tu nombre primero');
    if (Object.keys(resultados).length < 9) return alert('Marca todos los 9 partidos');
    
    acumuladas.push({ nombre, resultados: {...resultados}, fecha: new Date().toLocaleString('es-MX') });
    localStorage.setItem('quinielas351', JSON.stringify(acumuladas));
    actualizarAcumuladas();
    limpiarActual();
  };

  document.getElementById('btnLimpiar').onclick = limpiarActual;
  
  function limpiarActual() {
    document.getElementById('nombre').value = '';
    resultados = {};
    document.querySelectorAll('.botones button').forEach(b => b.classList.remove('activo'));
    actualizarFaltantes();
  }

  function actualizarAcumuladas() {
    const seccion = document.getElementById('seccionAcumuladas');
    const lista = document.getElementById('listaAcumuladas');
    
    if (acumuladas.length === 0) {
      seccion.style.display = 'none';
      return;
    }
    
    seccion.style.display = 'block';
    document.getElementById('total').textContent = acumuladas.length;
    document.getElementById('totalDinero').textContent = acumuladas.length * 10;
    lista.innerHTML = '';
    
    acumuladas.forEach((q, i) => {
      const div = document.createElement('div');
      div.className = 'quiniela-item';
      div.innerHTML = `
        <span>${i+1}. ${q.nombre} - $10</span>
        <button class="btn-borrar" onclick="borrarAcumulada(${i})">X</button>
      `;
      lista.appendChild(div);
    });
  }

  window.borrarAcumulada = (i) => {
    if (confirm(`¿Borrar quiniela de ${acumuladas[i].nombre}?`)) {
      acumuladas.splice(i, 1);
      localStorage.setItem('quinielas351', JSON.stringify(acumuladas));
      actualizarAcumuladas();
    }
  };

  document.getElementById('btnBorrarTodas').onclick = () => {
    if (acumuladas.length > 0 && confirm('¿Borrar TODAS las quinielas acumuladas?')) {
      acumuladas = [];
      localStorage.removeItem('quinielas351');
      actualizarAcumuladas();
    }
  };

  document.getElementById('btnDescargar').onclick = () => {
    let texto = `QUINIELAS 351 - JORNADA 15\n`;
    texto += `Total: ${acumuladas.length} quinielas x $10 = $${acumuladas.length * 10}\n\n`;
    
    acumuladas.forEach((q, i) => {
      texto += `${i+1}. ${q.nombre}\n`;
      partidos.forEach((p, j) => {
        texto += `${p.local} vs ${p.visita}: ${q.resultados[j]}\n`;
      });
      texto += `\n`;
    });
    
    const blob = new Blob([texto], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Quinielas351_J15.txt`;
    a.click();
  };

  document.getElementById('btnEnviar').onclick = () => {
    if (acumuladas.length === 0) return alert('Acumula al menos 1 quiniela');
    
    let mensaje = `*QUINIELAS 351 - J15*%0A`;
    mensaje += `Total: ${acumuladas.length} x $10 = $${acumuladas.length * 10}%0A%0A`;
    
    acumuladas.forEach((q, i) => {
      mensaje += `*${i+1}. ${q.nombre}*%0A`;
      partidos.forEach((p, j) => {
        mensaje += `${p.local} vs ${p.visita}: ${q.resultados[j]}%0A`;
      });
      mensaje += `%0A`;
    });
    
    window.open(`https://wa.me/${523513743191}?text=${mensaje}`, '_blank');
  };

  actualizarAcumuladas();
  actualizarFaltantes();
</script>
</body>
</html>
